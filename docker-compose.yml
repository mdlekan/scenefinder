version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: plein_air_db
    environment:
      POSTGRES_DB: plein_air
      POSTGRES_USER: plein_air_user
      POSTGRES_PASSWORD: plein_air_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata: