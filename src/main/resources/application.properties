# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/plein_air}
spring.datasource.username=${DATABASE_USERNAME:plein_air_user}
spring.datasource.password=${DATABASE_PASSWORD:plein_air_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA ? ddl-auto=none because Flyway manages schema now
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=3

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=scenefinder-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Logging
logging.level.org.springframework.kafka=DEBUG
logging.level.org.apache.kafka.clients=INFO

# Server
server.port=${PORT:8080}