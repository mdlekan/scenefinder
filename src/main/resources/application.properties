# Database ? reads from environment variables in production, falls back to local values
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/plein_air}
spring.datasource.username=${DATABASE_USERNAME:plein_air_user}
spring.datasource.password=${DATABASE_PASSWORD:plein_air_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Server port ? Railway injects PORT automatically
server.port=${PORT:8080}