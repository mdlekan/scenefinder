spring.datasource.username=${DATABASE_USERNAME:plein_air_user}
spring.datasource.password=${DATABASE_PASSWORD:plein_air_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# Add these new lines
spring.datasource.hikari.connection-init-sql=SELECT 1
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/plein_air}?sslmode=require

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

server.port=${PORT:8080}